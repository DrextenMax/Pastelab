name: "🐛 Bug Report"
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can investigate quickly.

  - type: input
    id: version
    attributes:
      label: PasteLab Version
      description: Found in Settings → About (e.g. `1.0.0`)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows Version
      description: e.g. Windows 11 23H2, Windows 10 22H2
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I paste a URL and click 'Decode URL', the app..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Paste `https://example.com?q=hello%20world` into PasteLab
        2. Click 'Decode URL'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Output (if any)
      description: Open DevTools with `Ctrl+Shift+I` in a dev build and paste any relevant errors.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, GIF recordings, or anything else that helps.
